
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週末遊戲時間銀行</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyBF7zDjqOYa5TMb36Ao00nH3TEPmMvVYPY",
      authDomain: "family-time-bank.firebaseapp.com",
      projectId: "family-time-bank",
      storageBucket: "family-time-bank.firebasestorage.app",
      messagingSenderId: "33780050612",
      appId: "1:33780050612:web:ba2f5fac10d610fac6c5e1"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();

    const { useState, useEffect } = React;

    function App() {
      // 系統與認證狀態
      const [authUser, setAuthUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [role, setRole] = useState(null);
      const [userRoles, setUserRoles] = useState({});

      // 資料庫狀態
      const [chengweiData, setChengweiData] = useState({ balance: 0, submission: null, history: [] });
      const [jingjieData, setJingjieData] = useState({ balance: 0, submission: null, history: [] });
      const [isOffline, setIsOffline] = useState(false);
      
      // 介面控制狀態
      const [selectedTasks, setSelectedTasks] = useState([]);
      const [redeemMode, setRedeemMode] = useState(false);
      const [redeemMins, setRedeemMins] = useState(30);
      const [historyTab, setHistoryTab] = useState('all'); 
      const [expandedLogId, setExpandedLogId] = useState(null); 
      
      // 彈窗系統
      const [dialog, setDialog] = useState(null); 
      const [editForm, setEditForm] = useState({ reason: '', points: 0 }); 

      const [manualReason, setManualReason] = useState({ chengwei: '', jingjie: '' });
      const [manualPoints, setManualPoints] = useState({ chengwei: '', jingjie: '' });
      const [parentVerified, setParentVerified] = useState({});

      const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-time-bank';
      const getDocRef = (docId) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('TimeBank').doc(docId);

      // --- 彈窗輔助函式 ---
      const showAlert = (title, message) => setDialog({ type: 'alert', title, message });
      const showConfirm = (title, message, onConfirm) => setDialog({ type: 'confirm', title, message, onConfirm });

      // --- 1. 監聽 Google 登入狀態 ---
      useEffect(() => {
        const unsubAuth = auth.onAuthStateChanged((user) => {
          setAuthLoading(false);
          if (user) {
            setAuthUser(user);
          } else {
            setAuthUser(null);
            setRole(null);
          }
        });
        return () => unsubAuth();
      }, []);

      // --- 2. 連線資料庫 ---
      useEffect(() => {
        if (!authUser) return;

        const unsubRoles = getDocRef('user_roles').onSnapshot((snap) => {
          if (snap.exists) {
            const roles = snap.data();
            setUserRoles(roles);
            setRole(roles[authUser.uid] || null);
          } else {
            getDocRef('user_roles').set({});
          }
        }, () => setIsOffline(true));

        const unsubCW = getDocRef('chengwei').onSnapshot((snap) => {
          if (snap.exists) setChengweiData(snap.data());
          else getDocRef('chengwei').set({ balance: 0, submission: null, history: [] });
        });

        const unsubJJ = getDocRef('jingjie').onSnapshot((snap) => {
          if (snap.exists) setJingjieData(snap.data());
          else getDocRef('jingjie').set({ balance: 0, submission: null, history: [] });
        });

        return () => { unsubRoles(); unsubCW(); unsubJJ(); };
      }, [authUser]);

      const saveChildData = async (kid, updatedFields) => {
        if (isOffline) {
          if (kid === 'chengwei') setChengweiData(prev => ({ ...prev, ...updatedFields }));
          if (kid === 'jingjie') setJingjieData(prev => ({ ...prev, ...updatedFields }));
          return;
        }
        const currentData = kid === 'chengwei' ? chengweiData : jingjieData;
        try {
          await getDocRef(kid).set({ ...currentData, ...updatedFields });
        } catch (error) {
          showAlert("連線錯誤", "資料儲存失敗，請檢查網路狀態。");
        }
      };

      const handleGoogleLogin = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => {
          if (err.code === 'auth/popup-blocked' || err.message.includes('cross-origin')) {
              showAlert("環境限制", "無法彈出登入視窗，請直接前往 Cloudflare 實際網址進行測試！");
          } else {
              showAlert("登入失敗", "請確認網域已加入 Firebase 白名單。\n" + err.message);
          }
        });
      };

      const handleBindRole = async (selectedRole) => {
        if (!authUser) return;
        try {
          await getDocRef('user_roles').set({ ...userRoles, [authUser.uid]: selectedRole });
          setRole(selectedRole);
        } catch (error) {
          showAlert("設定失敗", "無法綁定帳號，請確認權限。");
        }
      };

      // 統合數據
      const data = {
        balances: { chengwei: chengweiData.balance || 0, jingjie: jingjieData.balance || 0 },
        submissions: { chengwei: chengweiData.submission || null, jingjie: jingjieData.submission || null },
        history: [
          ...(chengweiData.history || []).map(h => ({ ...h, kid: 'chengwei' })),
          ...(jingjieData.history || []).map(h => ({ ...h, kid: 'jingjie' }))
        ].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
      };

      const getSubmission = (kid) => data.submissions?.[kid] || { status: 'none', date: '', time: '', points: 0, details: [] };
      const todayStr = new Date().toLocaleDateString('zh-TW');

      // --- 孩子功能 ---
      const submitTasks = (kid, totalPoints, taskDetails) => {
        if (selectedTasks.length === 0) return showAlert("提醒", "請至少勾選一項已完成的任務喔！");
        saveChildData(kid, {
          submission: {
            status: 'pending', date: todayStr,
            time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
            points: totalPoints, details: taskDetails 
          }
        });
      };

      const cancelSubmission = (kid, currentRoleTasks) => {
        const sub = getSubmission(kid);
        if (sub && sub.details) {
          const idsToSelect = currentRoleTasks
            .filter(t => sub.details.some(d => (d.id ? d.id === t.id : d === t.title)))
            .map(t => t.id);
          setSelectedTasks(idsToSelect);
        }
        saveChildData(kid, { submission: null });
      };

      const handleRedeem = (kid) => {
        if (redeemMins > data.balances[kid]) return showAlert("無法兌換", "餘額不足，無法兌換這麼多分鐘喔！");
        showConfirm("確認兌換", `確定要使用 ${redeemMins} 分鐘兌換遊戲時間嗎？`, () => {
          const newHistoryItem = {
            id: Date.now().toString(), kid, action: `🎮 兌換遊戲時間`, points: -redeemMins,
            date: todayStr, time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
            type: 'redeem', details: [`自主兌換了 ${redeemMins} 分鐘`], timestamp: Date.now()
          };
          const currentHistory = kid === 'chengwei' ? chengweiData.history : jingjieData.history;
          saveChildData(kid, {
            balance: data.balances[kid] - redeemMins,
            history: [newHistoryItem, ...(currentHistory || [])].slice(0, 100)
          });
          setRedeemMode(false);
        });
      };

      // --- 爸媽功能 ---
      const approveTask = (kid, pointsToAdd, verifiedTitles) => {
        const sub = getSubmission(kid);
        const newHistoryItem = {
          id: Date.now().toString(), kid, action: '✅ 每日任務打卡 (已核准)', points: pointsToAdd,
          date: sub.date, time: sub.time, type: 'daily', details: verifiedTitles, timestamp: Date.now()
        };
        const currentHistory = kid === 'chengwei' ? chengweiData.history : jingjieData.history;
        saveChildData(kid, {
          balance: data.balances[kid] + pointsToAdd,
          submission: { ...sub, status: 'approved' },
          history: [newHistoryItem, ...(currentHistory || [])].slice(0, 100)
        });
        setParentVerified(prev => { const n = {...prev}; delete n[kid]; return n; });
      };

      const executeManualUpdate = (kid, isAdd) => {
        const reason = manualReason[kid];
        const pts = parseInt(manualPoints[kid], 10);
        if (!reason || reason.trim() === '') return showAlert("輸入錯誤", "請填寫加/扣分事由！");
        if (isNaN(pts) || pts <= 0) return showAlert("輸入錯誤", "請填寫大於 0 的正確分數！");

        const finalPoints = isAdd ? pts : -pts;
        const newHistoryItem = {
          id: Date.now().toString(), kid, action: isAdd ? `🌟 家長加分` : `⚠️ 家長扣分`, points: finalPoints,
          date: todayStr, time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
          type: 'manual', details: [`事由：${reason}`], timestamp: Date.now()
        };
        const currentHistory = kid === 'chengwei' ? chengweiData.history : jingjieData.history;
        saveChildData(kid, {
          balance: Math.max(0, data.balances[kid] + finalPoints),
          history: [newHistoryItem, ...(currentHistory || [])].slice(0, 100)
        });
        setManualReason({...manualReason, [kid]: ''});
        setManualPoints({...manualPoints, [kid]: ''});
      };

      const executeQuickPenalty = (kid, reason, penaltyPoints) => {
         showConfirm("確認違規扣分", `確定要因為「${reason}」扣除 ${penaltyPoints} 分嗎？`, () => {
             const newHistoryItem = {
               id: Date.now().toString() + kid + 'penalty', kid: kid, action: `🚨 公告欄違規扣分`, points: -penaltyPoints,
               date: todayStr, time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
               type: 'manual', details: [`事由：${reason}`], timestamp: Date.now()
             };
             const currentHistory = kid === 'chengwei' ? chengweiData.history : jingjieData.history;
             saveChildData(kid, {
               balance: Math.max(0, data.balances[kid] - penaltyPoints),
               history: [newHistoryItem, ...(currentHistory || [])].slice(0, 100)
             });
             showAlert("扣分完成", `已成功扣除 ${penaltyPoints} 分。`);
         });
      };

      const handleDeleteHistory = (kid, record) => {
         showConfirm("刪除紀錄", `確定要刪除這筆紀錄嗎？\n系統會自動將分數扣回 / 加回。\n\n項目：${record.action} (${record.points}分)`, () => {
             const currentHistory = kid === 'chengwei' ? chengweiData.history : jingjieData.history;
             const newHistory = currentHistory.filter(h => h.id !== record.id);
             const newBalance = Math.max(0, data.balances[kid] - record.points);
             
             let updateObj = { balance: newBalance, history: newHistory };
             if (record.type === 'daily' && record.date === todayStr) {
                 updateObj.submission = null;
                 showAlert("已重置", "已刪除今日任務紀錄，孩子端已重新開放打卡！");
             }
             saveChildData(kid, updateObj);
         });
      };

      const handleEditHistoryClick = (kid, record) => {
          setEditForm({ reason: record.action, points: record.points });
          setDialog({ type: 'edit', title: '修改紀錄', record: record, kid: kid });
      };

      const submitEditForm = () => {
          const { kid, record } = dialog;
          const newReason = editForm.reason;
          const newPoints = parseInt(editForm.points, 10);
          
          if (!newReason.trim()) return showAlert("錯誤", "事由不能為空！");
          if (isNaN(newPoints)) return showAlert("錯誤", "分數格式不正確！");
          
          const currentHistory = kid === 'chengwei' ? chengweiData.history : jingjieData.history;
          const pointDiff = newPoints - record.points;
          const newBalance = Math.max(0, data.balances[kid] + pointDiff);
          
          const newHistory = currentHistory.map(h => {
              if (h.id === record.id) return { ...h, action: newReason, points: newPoints, details: [...(h.details||[]), `(已修改內容)`] };
              return h;
          });
          
          saveChildData(kid, { balance: newBalance, history: newHistory });
          setDialog(null);
      };

      // --- UI 共用組件 (結合全新樣式) ---
      const renderTopHeader = () => (
        <div className="bg-[#5B5CE6] text-white shadow-md mb-6 sticky top-0 z-40">
          <div className="max-w-4xl mx-auto px-4 sm:px-8 py-4 sm:py-6 flex flex-col sm:flex-row sm:justify-between items-center space-y-4 sm:space-y-0">
            {/* 左側標題 */}
            <div className="flex items-center w-full sm:w-auto justify-center sm:justify-start">
              <span className="text-4xl mr-3 font-bold">🏦</span>
              <div>
                <h1 className="font-black text-2xl md:text-3xl tracking-wider">週末遊戲時間銀行</h1>
                <p className="text-sm text-indigo-200 font-bold tracking-widest mt-1 uppercase opacity-90">Family Time Bank</p>
              </div>
            </div>
            
            {/* 右側登入狀態 (完美復刻設計) */}
            {authUser ? (
              <div className="flex items-center bg-white/10 backdrop-blur-md px-4 py-2 rounded-xl border border-white/20 animate-fade-in-up">
                <img src={authUser.photoURL || 'https://via.placeholder.com/40'} className="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-indigo-300 mr-3" />
                <div className="text-left hidden md:block mr-4">
                  <p className="text-xs text-indigo-200 font-black leading-none uppercase">Google Account</p>
                  <p className="text-sm font-bold truncate max-w-[150px] mt-0.5">{authUser.displayName}</p>
                </div>
                {/* 移除了切換身分按鈕，只保留登出 */}
                <button onClick={() => auth.signOut()} className="bg-white text-[#5B5CE6] hover:bg-indigo-50 font-black text-sm px-4 py-2 rounded-full transition-colors shadow-sm ml-2">
                  登出
                </button>
              </div>
            ) : (
              <div className="flex items-center bg-white/10 backdrop-blur-md pl-4 pr-2 py-2 rounded-[2rem] border border-white/20">
                <div className="w-8 h-8 bg-indigo-400/40 rounded-full flex items-center justify-center mr-3 text-lg">👤</div>
                <span className="font-bold text-base mr-4">尚未登入</span>
                <button onClick={handleGoogleLogin} className="bg-white text-[#5B5CE6] hover:bg-indigo-50 font-black text-sm px-5 py-2.5 rounded-full transition-colors shadow-sm flex items-center">
                  Google 登入
                </button>
              </div>
            )}
          </div>
        </div>
      );

      const renderDialogModal = () => {
        if (!dialog) return null;
        return (
          <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-6 md:p-8 animate-fade-in-up border border-slate-100">
               <h3 className="font-black text-2xl text-slate-800 mb-3 flex items-center">
                  {dialog.type === 'alert' && '⚠️'} {dialog.type === 'confirm' && '❓'} {dialog.type === 'edit' && '✏️'}
                  <span className="ml-2">{dialog.title}</span>
               </h3>
               {dialog.message && <p className="text-slate-600 font-medium whitespace-pre-wrap text-base md:text-lg leading-relaxed">{dialog.message}</p>}
               
               {dialog.type === 'alert' && (
                  <button onClick={()=>setDialog(null)} className="w-full mt-8 py-4 bg-[#5B5CE6] text-white rounded-xl font-bold text-lg">我知道了</button>
               )}
               {dialog.type === 'confirm' && (
                  <div className="flex space-x-4 mt-8">
                     <button onClick={()=>setDialog(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold text-lg">取消</button>
                     <button onClick={()=>{ dialog.onConfirm(); setDialog(null); }} className="flex-1 py-4 bg-[#5B5CE6] text-white rounded-xl font-bold text-lg">確定執行</button>
                  </div>
               )}
               {dialog.type === 'edit' && (
                  <div className="mt-6 space-y-4">
                     <div>
                        <label className="text-sm font-bold text-slate-500">修改事由：</label>
                        <input type="text" value={editForm.reason} onChange={e=>setEditForm({...editForm, reason: e.target.value})} className="w-full mt-2 p-3 border rounded-xl text-base bg-slate-50 focus:ring-2 focus:ring-indigo-200 outline-none" />
                     </div>
                     <div>
                        <label className="text-sm font-bold text-slate-500">修改分數 (扣分請加負號 -)：</label>
                        <input type="number" value={editForm.points} onChange={e=>setEditForm({...editForm, points: e.target.value})} className="w-full mt-2 p-3 border rounded-xl text-base bg-slate-50 focus:ring-2 focus:ring-indigo-200 outline-none" />
                     </div>
                     <div className="flex space-x-3 mt-8">
                        <button onClick={()=>setDialog(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold text-lg">取消</button>
                        <button onClick={submitEditForm} className="flex-1 py-3 bg-[#5B5CE6] text-white rounded-xl font-bold text-lg">儲存修改</button>
                     </div>
                  </div>
               )}
            </div>
          </div>
        );
      };

      if (authLoading) return <div className="min-h-screen flex items-center justify-center font-bold text-slate-500 text-lg animate-pulse">雲端銀行初始化中...</div>;

      // --- 畫面 1：Google 登入 (首頁) ---
      if (!authUser) return (
        <div>
          {renderTopHeader()}
          {renderDialogModal()}
          <div className="max-w-4xl mx-auto p-4 md:p-8">
            <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-6 md:p-8 flex items-start space-x-4 shadow-sm animate-fade-in-up">
              <span className="text-4xl">💳</span>
              <div>
                <h2 className="text-xl md:text-2xl font-black text-amber-900 mb-2">請小朋友記得先登入唷！</h2>
                <p className="text-base md:text-lg text-amber-800 font-medium leading-relaxed">
                  分別登入您的個人 Google 帳號，排定專屬身分後，埕緯與敬傑的時間帳戶及明細才不會混在一起。
                </p>
              </div>
            </div>
          </div>
        </div>
      );

      // --- 畫面 2：身分綁定 (第一次登入限定) ---
      if (!role) return (
        <div>
          {renderTopHeader()}
          {renderDialogModal()}
          <div className="max-w-2xl mx-auto p-6 bg-white rounded-3xl shadow-lg border border-slate-100 text-center mx-4 mt-6">
            <h2 className="text-2xl font-black text-slate-800 mb-3">👋 歡迎，{authUser.displayName}</h2>
            <p className="text-slate-500 mb-8 font-medium text-base md:text-lg">這是您第一次登入，請選擇您的專屬身分。<br/>綁定後，未來登入將會直接進入您的畫面！</p>
            <div className="space-y-4 md:space-y-6">
              <button onClick={() => handleBindRole('chengwei')} className="w-full p-6 bg-blue-500 text-white rounded-2xl font-black text-xl md:text-2xl shadow-md transition-transform active:scale-95 flex items-center justify-between">
                <span className="text-4xl drop-shadow-sm">👦</span><span>我是 哥哥 (埕緯)</span><span className="text-sm bg-white/20 px-4 py-1.5 rounded-full">點選綁定</span>
              </button>
              <button onClick={() => handleBindRole('jingjie')} className="w-full p-6 bg-emerald-500 text-white rounded-2xl font-black text-xl md:text-2xl shadow-md transition-transform active:scale-95 flex items-center justify-between">
                <span className="text-4xl drop-shadow-sm">🧒</span><span>我是 弟弟 (敬傑)</span><span className="text-sm bg-white/20 px-4 py-1.5 rounded-full">點選綁定</span>
              </button>
              <div className="relative py-4 md:py-6"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div><div className="relative flex justify-center"><span className="bg-white px-6 text-sm text-slate-400 font-bold">管理員專區</span></div></div>
              <button onClick={() => handleBindRole('parent')} className="w-full p-5 bg-slate-800 text-white rounded-2xl font-bold text-lg md:text-xl shadow-md transition-transform active:scale-95">🛡️ 爸媽專屬後台</button>
            </div>
          </div>
        </div>
      );

      // --- 畫面 3：爸媽管理後台 ---
      if (role === 'parent') return (
        <div>
          {renderTopHeader()}
          {renderDialogModal()}
          <div className="p-4 md:p-8 max-w-5xl mx-auto space-y-8 font-sans">
            <h2 className="text-2xl font-black text-center text-slate-800">家庭管理中心</h2>
            {['chengwei', 'jingjie'].map(k => {
              const sub = getSubmission(k);
              const kidHistory = (data.history || []).filter(h => h.kid === k);
              
              let statusBadge = <span className="text-slate-500 bg-slate-200 px-4 py-1.5 rounded-full font-bold ml-3 text-sm md:text-base">⚪ 尚未送出</span>;
              if (sub.status === 'pending') statusBadge = <span className="text-amber-700 bg-amber-100 px-4 py-1.5 rounded-full font-bold ml-3 text-sm md:text-base animate-pulse">🟡 待核准 ({sub.time})</span>;

                         <div onClick={() => setExpandedLogId(isExpanded ? null : h.id)} className="flex justify-between items-center p-5 md:p-6 cursor-pointer hover:bg-slate-100/50">
                           <div className="flex-1 pr-4">
                             <p className="font-bold text-base md:text-xl text-slate-700 flex items-center leading-snug">{h.action} {h.details && h.details.length > 0 && <span className={`ml-3 text-[12px] text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`}>▼</span>}</p>
                             <p className="text-sm md:text-base text-slate-400 mt-2 font-medium">{h.date} {h.time}</p>
                           </div>
                           <span className={`font-black text-2xl md:text-3xl whitespace-nowrap ${h.points > 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{h.points > 0 ? '+' : ''}{h.points}</span>
                         </div>
                         {isExpanded && h.details && h.details.length > 0 && (
                           <div className="bg-white p-5 md:p-6 border-t border-slate-100 text-base md:text-lg text-slate-600">
                             <p className="font-bold mb-3 text-sm md:text-base text-slate-400 tracking-wider">紀錄內容：</p>
                             <ul className="list-disc pl-6 space-y-2 md:space-y-3 font-medium leading-relaxed">
                                {h.details.map((detail, idx) => {
                                    const text = typeof detail === 'object' ? `${detail.title} (+${detail.points})` : detail;
                                    return <li key={idx}>{text}</li>;
                                })}
                             </ul>
                           </div>
                         )}
                       </li>
                     )
                  })}
                </ul>
              )}
            </div>
            
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
